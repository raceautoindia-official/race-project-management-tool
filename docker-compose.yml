services:
  mysql:
    image: mysql:8.0
    container_name: pm_app_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pm_app
    ports:
      - "3306:3306"
    volumes:
      - pm_app_db:/var/lib/mysql
      # Schema is applied automatically on first container start.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pm_app_db:
